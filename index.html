<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photobox Pro - Rainbow Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --vibrant-blue: #00d2ff;
            --vibrant-yellow: #ffeaa7;
            --vibrant-pink: #ff9ff3;
            --vibrant-purple: #a29bfe;
            --bg-gradient: linear-gradient(135deg, #00d2ff 0%, #ffeaa7 35%, #ff9ff3 70%, #a29bfe 100%);
            --btn-gradient: linear-gradient(135deg, #00d2ff 0%, #ff9ff3 50%, #a29bfe 100%);
            --glass: rgba(255, 255, 255, 0.85);
            --dark: #2d3436;
        }

        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        
        body { 
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px; width: 95vw; max-width: 1100px; 
            position: relative; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }
        .nav-admin { position: absolute; top: 20px; right: 20px; font-size: 14px; cursor: pointer; color: #b2bec3; }

        h1 { font-weight: 700; background: var(--btn-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0 0 10px 0; }
        
        .camera-layout { display: flex; gap: 20px; align-items: flex-start; }
        @media (max-width: 768px) { .camera-layout { flex-direction: column; } }

        .camera-container { 
            flex: 1.8; position: relative; border-radius: 20px; overflow: hidden; 
            background: #000; aspect-ratio: 4/3; border: 5px solid white;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8rem; color: white; font-weight: 700; z-index: 10; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 20; opacity: 0; pointer-events: none; }
        
        .sidebar-controls { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }

        button { 
            padding: 12px; border: none; border-radius: 12px; cursor: pointer; 
            font-weight: 600; background: #f1f2f6; transition: 0.3s;
        }

        .main-btn { background: var(--btn-gradient); color: white; box-shadow: 0 5px 15px rgba(162, 155, 254, 0.4); }
        
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }

        /* MODIFIKASI TAMPILAN PEMILIHAN FRAME */
        .frame-group { 
            display: flex; flex-wrap: nowrap; gap: 12px; margin-top: 5px; 
            overflow-x: auto; padding: 10px 5px; scrollbar-width: thin;
        }
        
        .frame-thumb-btn {
            background: white !important; padding: 6px; border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; 
            min-width: 90px; flex-shrink: 0; border-radius: 12px;
        }

        .active-opt { border: 3px solid; border-image: var(--btn-gradient) 1; border-radius: 12px; box-shadow: 0 0 10px var(--vibrant-pink); }
        
        /* Thumbnail Full Frame (Vertical Strip) */
        .thumb-preview { 
            width: 70px; height: 220px; border-radius: 4px; 
            object-fit: contain; background: #f8f8f8; border: 1px solid #eee;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card { background: var(--dark); color: white; padding: 15px; border-radius: 15px; border-bottom: 4px solid var(--vibrant-pink); }
        .card b { color: var(--vibrant-yellow); font-size: 18px; }
        
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-admin" onclick="showAdminLogin()">⚙️ Admin Area</div>

        <section id="screen-voucher" style="text-align: center;">
            <div style="font-size: 50px;">📸</div>
            <h1>Rainbow Photobox</h1>
            <p>Masukkan kode voucher untuk memulai sesi foto Anda.</p>
            <input type="text" id="voucher-input" placeholder="MASUKKAN KODE" style="text-align:center; font-weight:700; text-transform:uppercase;">
            <button class="main-btn" style="width:100%" onclick="validateVoucher()">MULAI FOTO</button>
            <p id="voucher-msg" style="color:red; font-size:12px;"></p>
        </section>

        <section id="screen-camera" class="hidden">
            <div class="camera-layout">
                <div class="camera-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div id="countdown" class="hidden">3</div>
                    <div id="flash"></div>
                </div>
                <div class="sidebar-controls">
                    <div>
                        <small><b>1. Pilih Filter:</b></small>
                        <div class="filter-group">
                            <button onclick="setFilter('none', this)" class="active-opt">Normal</button>
                            <button onclick="setFilter('grayscale(100%)', this)">B&W</button>
                            <button onclick="setFilter('sepia(100%)', this)">Vintage</button>
                        </div>
                    </div>
                    <div>
                        <small><b>2. Pilih Frame (Geser):</b></small>
                        <div id="user-frame-list" class="frame-group"></div>
                    </div>
                    <button id="start-btn" class="main-btn" onclick="startSequence()" style="height:60px; font-size: 16px;">📸 AMBIL FOTO (4X)</button>
                </div>
            </div>
        </section>

        <section id="screen-result" class="hidden" style="text-align: center;">
            <h1>Hasil Foto ✨</h1>
            <canvas id="output-canvas" style="width:100%; max-width:260px; border: 5px solid white; border-radius:10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);"></canvas>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button class="main-btn" style="flex:1" onclick="downloadStrip()">Download</button>
                <button onclick="location.reload()">Selesai</button>
            </div>
        </section>

        <section id="screen-admin-panel" class="hidden">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Admin Dashboard</h2>
                <button onclick="hideAdmin()">Keluar</button>
            </div>
            <div class="stats-grid">
                <div class="card">Total Voucher<br><b id="stat-total">0</b></div>
                <div class="card">Pendapatan<br><b>Rp </b><b id="stat-income">0</b></div>
            </div>
            <div style="background:#fff; padding:15px; border-radius:15px; margin-bottom:15px;">
                <small>Upload Frame Baru (.PNG):</small>
                <input type="file" id="frame-upload" accept="image/png">
                <button id="upload-btn" class="main-btn" style="width:100%" onclick="uploadFrame()">Upload ke Cloud</button>
            </div>
            <div style="max-height: 200px; overflow-y: auto; background:white; border-radius:15px;">
                <table style="width:100%; font-size:12px; border-collapse:collapse;">
                    <thead style="background:#eee;"><tr><th style="padding:10px;">Kode</th><th>Status</th></tr></thead>
                    <tbody id="voucher-table-body"></tbody>
                </table>
            </div>
            <button onclick="generateVouchers()" style="width:100%; margin-top:10px;">+ Generate 5 Voucher</button>
        </section>

        <section id="screen-admin-login" class="hidden" style="text-align:center;">
            <h3>Admin PIN</h3>
            <input type="password" id="admin-pin" placeholder="****" style="text-align:center;">
            <button class="main-btn" style="width:100%" onclick="loginAdmin()">Masuk</button>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://ukucdlkevgaxquspgive.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWNkbGtldmdheHF1c3BnaXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTY5MjYsImV4cCI6MjA4ODI3MjkyNn0.TrPZR31Wriw--G-iQYjEHoJGkw6LW6C0OzF9rCGQBwQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let photos = [];
        let cloudFrames = [];
        let currentFilter = 'none';
        let currentFrame = 'default';
        let activeVoucher = null;

        function switchScreen(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showAdminLogin() { switchScreen('screen-admin-login'); }
        function hideAdmin() { switchScreen('screen-voucher'); }
        function loginAdmin() {
            if(document.getElementById('admin-pin').value === "1234") {
                switchScreen('screen-admin-panel');
                renderAdmin();
            } else { alert("PIN Salah!"); }
        }

        async function fetchFrames() {
            const { data } = await _supabase.from('frames').select('*').order('id', { ascending: false });
            cloudFrames = data || [];
            loadUserFrames();
        }

        function loadUserFrames() {
            const container = document.getElementById('user-frame-list');
            if(!container) return;
            container.innerHTML = '';
            
            const btnPolos = document.createElement('button');
            btnPolos.className = 'frame-thumb-btn ' + (currentFrame === 'default' ? 'active-opt' : '');
            btnPolos.innerHTML = `<div class="thumb-preview" style="border:1px dashed #ccc; display:flex; align-items:center; justify-content:center; font-size:10px; color:#999;">POLOS</div><span style="font-size:9px; margin-top:4px;">None</span>`;
            btnPolos.onclick = () => { currentFrame = 'default'; loadUserFrames(); };
            container.appendChild(btnPolos);

            cloudFrames.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'frame-thumb-btn ' + (currentFrame === f.url ? 'active-opt' : '');
                btn.innerHTML = `<img src="${f.url}" class="thumb-preview"><span style="font-size:9px; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%;">${f.name.split('.')[0]}</span>`;
                btn.onclick = () => { currentFrame = f.url; loadUserFrames(); };
                container.appendChild(btn);
            });
        }

        async function uploadFrame() {
            const file = document.getElementById('frame-upload').files[0];
            const btn = document.getElementById('upload-btn');
            if(!file) return alert("Pilih file PNG!");
            btn.disabled = true; btn.innerText = "Mengunggah...";
            const fileName = `frame_${Date.now()}.png`;
            const { error: storageError } = await _supabase.storage.from('frames-bucket').upload(fileName, file);
            if (storageError) { alert("Error: " + storageError.message); btn.disabled = false; return; }
            const { data: { publicUrl } } = _supabase.storage.from('frames-bucket').getPublicUrl(fileName);
            await _supabase.from('frames').insert([{ name: file.name, url: publicUrl }]);
            btn.disabled = false; btn.innerText = "Upload ke Cloud";
            fetchFrames(); renderAdmin();
        }

        async function validateVoucher() {
            const code = document.getElementById('voucher-input').value.toUpperCase();
            const { data: v } = await _supabase.from('vouchers').select('*').eq('code', code).eq('used', false).single();
            if(v) { activeVoucher = code; await fetchFrames(); switchScreen('screen-camera'); startCamera(); }
            else { document.getElementById('voucher-msg').innerText = "Voucher tidak valid!"; }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: "user" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(() => alert("Kamera tidak ditemukan!"));
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.getElementById('video').style.filter = f;
            document.querySelectorAll('.filter-group button').forEach(b => b.classList.remove('active-opt'));
            btn.classList.add('active-opt');
        }

        async function startSequence() {
            photos = [];
            document.getElementById('start-btn').disabled = true;
            for (let i = 0; i < 4; i++) {
                let count = 3;
                const cd = document.getElementById('countdown');
                cd.classList.remove('hidden');
                while(count > 0) { cd.innerText = count; await new Promise(r => setTimeout(r, 1000)); count--; }
                cd.classList.add('hidden');
                takeSnap();
                await new Promise(r => setTimeout(r, 800));
            }
            createStrip();
        }

        function takeSnap() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 768;
            const ctx = canvas.getContext('2d');
            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
            ctx.filter = currentFilter;
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            photos.push(canvas.toDataURL('image/jpeg', 0.8));
        }

        // FUNGSI UTAMA UNTUK LEBAR BORDER & FOOTER
        function createStrip() {
            const canvas = document.getElementById('output-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = 1200; 
            canvas.height = 3800; // Tinggi ekstra untuk area desain bawah

            ctx.fillStyle = "#fff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // KONFIGURASI MARGIN LEBAR (Sesuai Permintaan)
            const sideMargin = 110;  
            const topMargin = 120;   
            const photoGap = 60;     
            const photoWidth = 980;  
            const photoHeight = 735; 

            let loaded = 0;
            photos.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    const yPos = topMargin + (i * (photoHeight + photoGap));
                    ctx.drawImage(img, sideMargin, yPos, photoWidth, photoHeight);
                    loaded++;
                    
                    if(loaded === 4) {
                        if(currentFrame !== 'default') {
                            const frameImg = new Image();
                            frameImg.crossOrigin = "anonymous";
                            frameImg.onload = () => { 
                                ctx.drawImage(frameImg, 0, 0, 1200, 3800); 
                                switchScreen('screen-result'); 
                            };
                            frameImg.src = currentFrame;
                        } else {
                            switchScreen('screen-result');
                        }
                    }
                };
                img.src = src;
            });
        }

        async function downloadStrip() {
            const canvas = document.getElementById('output-canvas');
            const link = document.createElement('a');
            link.download = `Photo_${activeVoucher}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
            await _supabase.from('vouchers').update({ used: true, used_at: new Date().toLocaleTimeString() }).eq('code', activeVoucher);
            setTimeout(() => location.reload(), 2000);
        }

        async function renderAdmin() {
            const { data } = await _supabase.from('vouchers').select('*').order('created_at', { ascending: false });
            if(data) {
                const used = data.filter(v => v.used).length;
                document.getElementById('stat-total').innerText = data.length;
                document.getElementById('stat-income').innerText = (used * 15000).toLocaleString('id-ID');
                document.getElementById('voucher-table-body').innerHTML = data.map(v => `<tr><td style="padding:8px;">${v.code}</td><td>${v.used ? '✅' : '⏳'}</td></tr>`).join('');
            }
        }

        async function generateVouchers() {
            const codes = [];
            for(let i=0; i<5; i++) codes.push({ code: Math.random().toString(36).substring(2, 8).toUpperCase(), used: false });
            await _supabase.from('vouchers').insert(codes);
            renderAdmin();
        }

        window.onload = fetchFrames;
    </script>
</body>
</html>
