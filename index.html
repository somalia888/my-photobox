<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photobox Pro - Stable Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #6c5ce7; --danger: #ff7675; --dark: #2d3436; --light: #f9f9f9; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #dfe6e9; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 95vw; 
            max-width: 950px; 
            position: relative; 
            box-sizing: border-box;
        }

        .hidden { display: none !important; }
        .nav-admin { position: absolute; top: 15px; right: 15px; font-size: 12px; cursor: pointer; color: #aaa; z-index: 100; }

        /* LAYOUT RESPONSIF */
        .camera-layout { display: flex; gap: 20px; flex-direction: row; }
        @media (max-width: 768px) { .camera-layout { flex-direction: column; } }

        .camera-container { 
            flex: 2;
            position: relative; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            aspect-ratio: 4/3;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; color: white; font-weight: bold; z-index: 10; }
        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 20; opacity: 0; pointer-events: none; transition: 0.1s; }
        
        .sidebar-controls { flex: 1; display: flex; flex-direction: column; gap: 10px; }

        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; background: #eee; }
        .main-btn { background: var(--primary); color: white; width: 100%; font-size: 16px; }
        .danger { background: var(--danger); color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; }
        
        .filter-group, .frame-group { display: flex; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
        .active-opt { border: 2px solid var(--primary) !important; background: #e8e7ff; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--dark); color: white; padding: 10px; border-radius: 10px; font-size: 12px; }
        .scroll-table { max-height: 200px; overflow-y: auto; border: 1px solid #eee; margin-top: 10px; }
        table { width: 100%; font-size: 11px; border-collapse: collapse; }
        th, td { padding: 6px; border-bottom: 1px solid #eee; text-align: center; }

        canvas { width: 100%; max-width: 300px; display: block; margin: 10px auto; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-admin" onclick="showAdminLogin()">⚙️ Admin</div>

        <section id="screen-voucher">
            <h1 style="margin:0; text-align: center;">📸 Photobox</h1>
            <p style="text-align: center;">Masukkan kode voucher Anda</p>
            <input type="text" id="voucher-input" placeholder="Ketik Kode" maxlength="8" style="text-transform: uppercase;">
            <button class="main-btn" onclick="validateVoucher()">MULAI FOTO</button>
            <p id="voucher-msg" style="color:red; font-size:13px; text-align: center;"></p>
        </section>

        <section id="screen-camera" class="hidden">
            <div class="camera-layout">
                <div class="camera-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div id="countdown" class="hidden">3</div>
                    <div id="flash"></div>
                </div>
                <div class="sidebar-controls">
                    <div style="font-size:12px; font-weight: bold;">Pilih Filter:</div>
                    <div class="filter-group">
                        <button onclick="setFilter('none', this)" class="active-opt">Normal</button>
                        <button onclick="setFilter('grayscale(100%)', this)">B&W</button>
                        <button onclick="setFilter('sepia(100%)', this)">Sepia</button>
                        <button onclick="setFilter('brightness(1.2) contrast(1.1)', this)">Fresh</button>
                    </div>
                    <div style="font-size:12px; font-weight: bold;">Pilih Frame:</div>
                    <div id="user-frame-list" class="frame-group">
                        <button id="default-frame-btn" onclick="setFrame('default', this)" class="active-opt">Polos</button>
                    </div>
                    <button id="start-btn" class="main-btn" onclick="startSequence()">AMBIL FOTO (4x)</button>
                </div>
            </div>
        </section>

        <section id="screen-result" class="hidden">
            <h3 style="text-align:center">Selesai! ✨</h3>
            <canvas id="output-canvas"></canvas>
            <button onclick="downloadStrip()" class="main-btn">Download & Simpan (HD)</button>
            <button onclick="location.reload()" style="width:100%; margin-top:10px">Kembali</button>
        </section>

        <section id="screen-admin-login" class="hidden">
            <h3>Admin Access</h3>
            <input type="password" id="admin-pin" placeholder="PIN Admin">
            <button class="main-btn" onclick="loginAdmin()">Login</button>
            <button onclick="hideAdmin()" style="width:100%; margin-top:10px">Batal</button>
        </section>

        <section id="screen-admin-panel" class="hidden">
            <h2 style="margin:0">📊 Dashboard</h2>
            <div class="stats-grid">
                <div class="card">Total: <b id="stat-total">0</b></div>
                <div class="card">Used: <b id="stat-used">0</b></div>
                <div class="card">Income: Rp <span id="stat-income">0</span></div>
            </div>
            <hr>
            <input type="file" id="frame-upload" accept="image/png">
            <button onclick="uploadFrame()" style="width:100%">Upload Frame</button>
            <div id="admin-frame-list" style="display:flex; gap:5px; overflow-x:auto; padding:10px 0;"></div>
            <hr>
            <button onclick="generateVouchers()" style="width:100%">Generate 5 Voucher</button>
            <div class="scroll-table"><table id="voucher-table"><tbody></tbody></table></div>
            <button class="danger" onclick="resetAllData()" style="width:100%; margin-top:10px">RESET DATA</button>
            <button onclick="hideAdmin()" style="width:100%; margin-top:10px">Keluar</button>
        </section>
    </div>

    <script>
        const SUPABASE_URL = 'https://ukucdlkevgaxquspgive.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdWNkbGtldmdheHF1c3BnaXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTY5MjYsImV4cCI6MjA4ODI3MjkyNn0.TrPZR31Wriw--G-iQYjEHoJGkw6LW6C0OzF9rCGQBwQ';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_PIN = "1234";
        let photos = [];
        let currentFilter = 'none';
        let currentFrame = 'default';
        let activeVoucher = null;

        function setFilter(f, btn) {
            currentFilter = f;
            document.getElementById('video').style.filter = f;
            document.querySelectorAll('.filter-group button').forEach(b => b.classList.remove('active-opt'));
            btn.classList.add('active-opt');
        }

        async function validateVoucher() {
            const input = document.getElementById('voucher-input').value.toUpperCase();
            const { data: v } = await _supabase.from('vouchers').select('*').eq('code', input).eq('used', false).single();
            if (v) { activeVoucher = input; switchScreen('screen-camera'); loadUserFrames(); startCamera(); }
            else { document.getElementById('voucher-msg').innerText = "Voucher tidak valid!"; }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1920 }, height: { ideal: 1080 } } })
            .then(s => document.getElementById('video').srcObject = s);
        }

        async function startSequence() {
            photos = [];
            document.getElementById('start-btn').disabled = true;
            for (let i = 0; i < 4; i++) {
                let count = 3;
                const cd = document.getElementById('countdown');
                cd.classList.remove('hidden');
                while(count > 0) { cd.innerText = count; await new Promise(r => setTimeout(r, 1000)); count--; }
                cd.classList.add('hidden');
                takeSnap();
                await new Promise(r => setTimeout(r, 1000));
            }
            createStrip();
        }

        // --- SOLUSI FILTER KONSISTEN (LAPTOP & HP) ---
        function takeSnap() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = 1440; canvas.height = 1080;
            const ctx = canvas.getContext('2d');
            
            // 1. Terapkan filter ke context canvas (PENTING)
            ctx.filter = currentFilter;

            // Efek Flash
            document.getElementById('flash').style.opacity = '1';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);

            // 2. Mirroring
            ctx.save();
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            
            // 3. Logika Anti-Gepeng (Crop Center)
            const targetRatio = canvas.width / canvas.height;
            const sourceRatio = video.videoWidth / video.videoHeight;
            let sx, sy, sWidth, sHeight;

            if (sourceRatio > targetRatio) {
                sWidth = video.videoHeight * targetRatio;
                sHeight = video.videoHeight;
                sx = (video.videoWidth - sWidth) / 2;
                sy = 0;
            } else {
                sWidth = video.videoWidth;
                sHeight = video.videoWidth / targetRatio;
                sx = 0;
                sy = (video.videoHeight - sHeight) / 2;
            }

            ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvas.width, canvas.height);
            ctx.restore();

            photos.push(canvas.toDataURL('image/jpeg', 0.95));
        }

        function createStrip() {
            const canvas = document.getElementById('output-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200; canvas.height = 3600;
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            let loaded = 0;
            photos.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 90, 120 + (i * 840), 1020, 765);
                    loaded++;
                    if(loaded === 4) applyOverlay(ctx);
                };
                img.src = src;
            });
        }

        function applyOverlay(ctx) {
            const custom = JSON.parse(localStorage.getItem('custom_frames') || '[]');
            const frame = custom.find(f => f.id === currentFrame);
            if(frame) {
                const img = new Image();
                img.onload = () => { ctx.drawImage(img, 0, 0, 1200, 3600); switchScreen('screen-result'); };
                img.src = frame.data;
            } else {
                ctx.strokeStyle = "#000"; ctx.lineWidth = 40; ctx.strokeRect(40, 40, 1120, 3520);
                switchScreen('screen-result');
            }
        }

        async function downloadStrip() {
            const canvas = document.getElementById('output-canvas');
            const link = document.createElement('a');
            link.download = `photostrip_${activeVoucher}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 1.0);
            link.click();
            await _supabase.from('vouchers').update({ used: true, used_at: new Date().toLocaleTimeString() }).eq('code', activeVoucher);
            setTimeout(() => location.reload(), 2000);
        }

        // Fungsi Pendukung Lainnya
        function switchScreen(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function showAdminLogin() { switchScreen('screen-admin-login'); }
        function hideAdmin() { switchScreen('screen-voucher'); }
        function loginAdmin() { if(document.getElementById('admin-pin').value === ADMIN_PIN) { switchScreen('screen-admin-panel'); renderAdmin(); } else { alert("PIN Salah!"); } }
        async function generateVouchers() { const codes = []; for(let i=0; i<5; i++) codes.push({ code: Math.random().toString(36).substring(2, 10).toUpperCase(), used: false }); await _supabase.from('vouchers').insert(codes); renderAdmin(); }
        async function renderAdmin() { 
            const { data: db } = await _supabase.from('vouchers').select('*').order('created_at', { ascending: false });
            if(!db) return;
            document.getElementById('stat-total').innerText = db.length;
            document.getElementById('stat-used').innerText = db.filter(v => v.used).length;
            document.querySelector('#voucher-table tbody').innerHTML = db.map(v => `<tr><td>${v.code}</td><td>${v.used?'✅':'⏳'}</td></tr>`).join('');
            const frames = JSON.parse(localStorage.getItem('custom_frames') || '[]');
            document.getElementById('admin-frame-list').innerHTML = frames.map((f, i) => `<img src="${f.data}" style="height:50px;" onclick="deleteFrame(${i})">`).join('');
        }
        function uploadFrame() { const file = document.getElementById('frame-upload').files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { let f = JSON.parse(localStorage.getItem('custom_frames') || '[]'); f.push({ id: 'f'+Date.now(), name: file.name, data: e.target.result }); localStorage.setItem('custom_frames', JSON.stringify(f)); renderAdmin(); loadUserFrames(); }; reader.readAsDataURL(file); }
        function loadUserFrames() { const container = document.getElementById('user-frame-list'); container.innerHTML = '<button onclick="setFrame(\'default\', this)" class="active-opt">Polos</button>'; JSON.parse(localStorage.getItem('custom_frames') || '[]').forEach(f => { const btn = document.createElement('button'); btn.innerText = "Frame"; btn.onclick = () => setFrame(f.id, btn); container.appendChild(btn); }); }
        function setFrame(f, btn) { currentFrame = f; document.querySelectorAll('.frame-group button').forEach(b => b.classList.remove('active-opt')); btn.classList.add('active-opt'); }
        async function resetAllData() { if(confirm("Hapus semua?")) { await _supabase.from('vouchers').delete().neq('code', ''); localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
